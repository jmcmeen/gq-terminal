name: Publish to PyPI

# Triggered on a published GitHub Release (tag like v0.2.0).
# Uses PyPI's "trusted publishing" (OIDC) — no API tokens stored in repo secrets.
#
# One-time setup on PyPI:
#   1. Create the project on https://pypi.org/ (or wait for the first upload).
#   2. On the project page → Publishing → Add a new pending publisher:
#        - PyPI Project Name: gq-terminal
#        - Owner: jmcmeen
#        - Repository name: gq-terminal
#        - Workflow name: publish.yml
#        - Environment name: pypi
#   3. In GitHub repo settings → Environments → create an environment named "pypi".
#      Add required reviewers if you want a manual approval step before publish.

on:
  release:
    types: [published]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Build sdist + wheel
        run: uv build

      - name: Verify metadata
        run: uvx twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/p/gq-terminal
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
